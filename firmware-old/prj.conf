# Zephyr RTOS Configuration for Driver Monitoring System
# Infineon PSoC Edge AI Kit - Cortex-M55 core

# Core settings
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=16384

# Hardware
CONFIG_GPIO=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y

# Console
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Cortex-M55 has FPU
CONFIG_FPU=y

# Use newlib for full math support
CONFIG_NEWLIB_LIBC=y
