task: "eye_state"

classes:
  - "eyes_open"
  - "eyes_partially_closed"
  - "eyes_closed"
  - "sunglasses"

model:
  backbone: "mobilenet_v3_small"
  num_classes: 4
  head_dropout: 0.3
  ear_regression: true

data:
  image_size: 112

training:
  batch_size: 64
  epochs: 30
  learning_rate: 0.0005

loss:
  type: "multi_task"
  classification_weight: 1.0
  regression_weight: 0.5
  focal_gamma: 2.0
  label_smoothing: 0.1

datasets:
  - name: "mrl_eyes"
    weight: 1.0
  - name: "custom_supabase"
    weight: 0.5
