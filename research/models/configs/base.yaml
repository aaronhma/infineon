training:
  batch_size: 32
  epochs: 50
  learning_rate: 0.001
  weight_decay: 1.0e-4
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 3
  early_stopping_patience: 10
  mixed_precision: true
  gradient_accumulation_steps: 1

backbone:
  name: "mobilenet_v3_small"
  pretrained: true
  freeze_epochs: 5

augmentation:
  train:
    horizontal_flip: 0.5
    brightness_limit: 0.2
    contrast_limit: 0.2
    brightness_contrast_p: 0.3
    gaussian_blur_limit: 3
    gaussian_blur_p: 0.1
    gamma_limit: [80, 120]
    gamma_p: 0.2
    motion_blur_limit: 5
    motion_blur_p: 0.15
    coarse_dropout_max_holes: 8
    coarse_dropout_max_height: 16
    coarse_dropout_max_width: 16
    coarse_dropout_p: 0.2
  val: {}

data:
  image_size: 224
  num_workers: 4
  pin_memory: true
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]

logging:
  log_dir: "models/logs"
  log_every_n_steps: 10
  save_top_k: 3

checkpointing:
  save_dir: "models/checkpoints"
