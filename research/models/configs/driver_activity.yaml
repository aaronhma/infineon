task: "driver_activity"

classes:
  - "safe_driving"
  - "texting_phone_right"
  - "texting_phone_left"
  - "talking_phone_right"
  - "talking_phone_left"
  - "drinking"
  - "reaching_behind"
  - "looking_away"
  - "adjusting_hair_makeup"
  - "talking_passenger"

model:
  backbone: "mobilenet_v3_small"
  num_classes: 10
  head_dropout: 0.4
  hidden_dim: 128

data:
  image_size: 224

training:
  batch_size: 32
  epochs: 50
  learning_rate: 0.001

loss:
  type: "focal"
  focal_gamma: 2.0
  label_smoothing: 0.1

datasets:
  - name: "statefarm"
    weight: 1.0
  - name: "custom_supabase"
    weight: 0.5
