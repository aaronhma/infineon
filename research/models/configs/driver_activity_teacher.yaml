# Teacher model config: larger backbone for maximum accuracy.
# Train this first, then distill into the student (driver_activity.yaml).

task: "driver_activity"

classes:
  - "safe_driving"
  - "texting_phone_right"
  - "texting_phone_left"
  - "talking_phone_right"
  - "talking_phone_left"
  - "drinking"
  - "reaching_behind"
  - "looking_away"
  - "adjusting_hair_makeup"
  - "talking_passenger"

model:
  backbone: "efficientnet_b0"
  num_classes: 10
  head_dropout: 0.4
  hidden_dim: 256

backbone:
  name: "efficientnet_b0"
  pretrained: true
  freeze_epochs: 3

data:
  image_size: 224

training:
  batch_size: 16
  epochs: 80
  learning_rate: 0.0005
  early_stopping_patience: 15
  mixed_precision: true

loss:
  type: "focal"
  focal_gamma: 2.0
  label_smoothing: 0.1

datasets:
  - name: "statefarm"
    weight: 1.0

checkpointing:
  save_dir: "models/checkpoints"
