# Teacher model for eye state: larger backbone.
# Train this first, then distill into the student (eye_state.yaml).

task: "eye_state"

classes:
  - "eyes_open"
  - "eyes_partially_closed"
  - "eyes_closed"
  - "sunglasses"

model:
  backbone: "efficientnet_b0"
  num_classes: 4
  head_dropout: 0.3
  ear_regression: true

backbone:
  name: "efficientnet_b0"
  pretrained: true
  freeze_epochs: 3

data:
  image_size: 112

training:
  batch_size: 32
  epochs: 60
  learning_rate: 0.0005
  early_stopping_patience: 15

loss:
  type: "multi_task"
  classification_weight: 1.0
  regression_weight: 0.5
  focal_gamma: 2.0
  label_smoothing: 0.1
